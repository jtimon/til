name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Manual runs on any branch: lets bot sessions iterate on
  # platform-specific jobs (issue #25 macos bring-up) from a feature
  # branch instead of burning a master merge per attempt.
  workflow_dispatch:

jobs:
  linux-x64:
    name: linux-x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build and run tests
        run: make test
      - name: Test target build
        run: |
          ./bin/til build --target=linux-x64 -o bin/hello_script_x64 examples/hello_script.til
          file bin/hello_script_x64 | grep -q "x86-64"
          ./bin/hello_script_x64

  # Issue #309: USize now defaults to U32, so every other job exercises the
  # U32 width. This job keeps U64 coverage on Linux: it runs the --usize=64
  # opt-out regression AND rebuilds the whole compiler at --usize=64 (a U32
  # host folding U64-target code -- the reverse of the default divergence),
  # then uses that U64 compiler to build and run a program.
  linux-x64-usize64:
    name: linux-x64 (--usize=64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build compiler (default U32)
        run: make
      - name: usize=64 opt-out regression
        run: make check_usize64
      - name: Rebuild the compiler at --usize=64 and use it
        run: |
          ./bin/til build --usize=64 -o bin/til_u64 src/til.til
          ./bin/til_u64 build -o bin/hello_via_u64 examples/hello_script.til
          ./bin/hello_via_u64 | grep -q "Hello World"

  # Issue #25: aarch64-linux as a native HOST (GitHub's free arm64
  # runners), running the full suite. Blocking like every other linux
  # job: its bring-up failures (plain-char signedness) were fixed by
  # the -fsigned-char contract and the suite is green here.
  linux-arm64-native:
    name: linux-arm64 (native)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build and run tests
        run: make test
      - name: Test target build
        run: |
          ./bin/til build --target=linux-arm64 -o bin/hello_script_arm64_native examples/hello_script.til
          file bin/hello_script_arm64_native | grep -q "aarch64"
          ./bin/hello_script_arm64_native
          ./bin/hello_script_arm64_native | grep -q "Hello World"

  linux-arm64:
    name: linux-arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri gcc-aarch64-linux-gnu
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile for linux-arm64
        run: |
          ./bin/til build --target=linux-arm64 -o bin/hello_script_arm64 examples/hello_script.til
          file bin/hello_script_arm64 | grep -q "aarch64"

  linux-riscv64:
    name: linux-riscv64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri gcc-riscv64-linux-gnu
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile for linux-riscv64
        run: |
          ./bin/til build --target=linux-riscv64 -o bin/hello_script_riscv64 examples/hello_script.til
          file bin/hello_script_riscv64 | grep -q "RISC-V"

  linux-x86:
    name: linux-x86
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri gcc-multilib qemu-user
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile and run for linux-x86
        run: |
          ./bin/til build --target=linux-x86 -o bin/hello_script_x86 examples/hello_script.til
          file bin/hello_script_x86 | grep -q "80386"
          qemu-i386 bin/hello_script_x86
          qemu-i386 bin/hello_script_x86 | grep -q "Hello World"
      # Issue #232: 32-bit linux GUI. raylib compiles -m32 against the
      # vendored X11 headers and GLFW dlopens libX11 at runtime, so
      # BUILDING needs only gcc-multilib (installed above) -- no 32-bit
      # X11 sysroot. RUNNING the binary is another matter: the i386
      # process can't load the runner's 64-bit libX11, so GLFW's dlopen
      # fails and raylib segfaults windowless (run 29622850794); install
      # the i386 X11/GL runtime libs so the qemu+xvfb run opens a real
      # window. timeout 124 = alive and drawing when killed, same
      # contract as the gui suite's build tests.
      - name: Cross-compile and run a GUI example for linux-x86
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y libx11-6:i386 libxrandr2:i386 libxinerama1:i386 \
            libxcursor1:i386 libxi6:i386 libxext6:i386 libgl1:i386 libgl1-mesa-dri:i386
          make vendor/raylib/src/libraylib-x86.a vendor/tinyfiledialogs/libtinyfd-x86.a
          ./bin/til build --target=linux-x86 -o bin/hello_gui_x86 examples/hello_gui.til
          file bin/hello_gui_x86 | grep -q "80386"
          rc=0; xvfb-run --auto-servernum timeout 3 qemu-i386 bin/hello_gui_x86 || rc=$?
          test "$rc" = "124"

  linux-arm32:
    name: linux-arm32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri gcc-arm-linux-gnueabihf qemu-user
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile for linux-arm32
        run: |
          ./bin/til build --target=linux-arm32 -o bin/hello_script_arm32 examples/hello_script.til
          file bin/hello_script_arm32 | grep -q "ARM"
      - name: Run via qemu-arm
        run: |
          qemu-arm -L /usr/arm-linux-gnueabihf bin/hello_script_arm32
          qemu-arm -L /usr/arm-linux-gnueabihf bin/hello_script_arm32 | grep -q "Hello World"

  linux-riscv32:
    name: linux-riscv32
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri qemu-user bzip2
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Download Bootlin riscv32 toolchain
        run: |
          curl -sL https://toolchains.bootlin.com/downloads/releases/toolchains/riscv32-ilp32d/tarballs/riscv32-ilp32d--glibc--bleeding-edge-2024.02-1.tar.bz2 \
            -o /tmp/riscv32-toolchain.tar.bz2
          mkdir -p /tmp/riscv32-tc
          tar -xjf /tmp/riscv32-toolchain.tar.bz2 -C /tmp/riscv32-tc
          TC_DIR=$(ls -d /tmp/riscv32-tc/riscv32*)
          # Bootlin SDKs bake in their build-time path; relocate-sdk.sh
          # rewrites all internal paths for the new extraction location.
          # Without it gcc fails to find its sub-tools/sysroot.
          "$TC_DIR/relocate-sdk.sh"
          echo "RISCV32_TC=$TC_DIR" >> $GITHUB_ENV
          echo "Toolchain: $TC_DIR"
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile and run for linux-riscv32
        run: |
          RISCV32_CC=$(ls "$RISCV32_TC"/bin/riscv32-*-gcc | head -1)
          ./bin/til build --target=linux-riscv32 --cc="$RISCV32_CC" \
            -o bin/hello_script_riscv32 examples/hello_script.til
          file bin/hello_script_riscv32 | grep -q "RISC-V"
          SYSROOT=$("$RISCV32_CC" -print-sysroot)
          qemu-riscv32 -L "$SYSROOT" bin/hello_script_riscv32
          qemu-riscv32 -L "$SYSROOT" bin/hello_script_riscv32 | grep -q "Hello World"

  windows-x64-build:
    name: windows-x64/x86 (cross-compile on linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri mingw-w64
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile for windows-x64 and windows-x86
        run: |
          ./bin/til build --target=windows-x64 -o bin/hello_script.exe examples/hello_script.til
          file bin/hello_script.exe | grep -q "PE32+"
          # windows-x86 (32-bit, mingw i686) -- issue #232
          ./bin/til build --target=windows-x86 -o bin/hello_script-x86.exe examples/hello_script.til
          file bin/hello_script-x86.exe | grep -q "Intel 80386"
      # Issue #232: prove mode gui cross-links for BOTH windows arches. mingw
      # ships the win32/win64 GL/GDI backend, so raylib/tinyfd cross-build
      # from source with no X11 sysroot. Build-only (a raylib window cannot
      # open on a headless runner) -- the file-format check is the proof, the
      # same shape as the mac gui-cross job.
      - name: Cross-compile a GUI example for windows-x64 and windows-x86
        run: |
          make vendor/raylib/src/libraylib-win64.a vendor/tinyfiledialogs/libtinyfd-win64.a
          make vendor/raylib/src/libraylib-win32.a vendor/tinyfiledialogs/libtinyfd-win32.a
          ./bin/til build --target=windows-x64 -o bin/hello_gui.exe examples/hello_gui.til
          file bin/hello_gui.exe | grep -q "PE32+"
          ./bin/til build --target=windows-x86 -o bin/hello_gui-x86.exe examples/hello_gui.til
          file bin/hello_gui-x86.exe | grep -q "Intel 80386"
      - name: Upload .exe artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_script-windows
          path: |
            bin/hello_script.exe
            bin/hello_script-x86.exe

  windows-x64-run:
    name: windows-x64/x86 (run .exe on windows)
    needs: windows-x64-build
    runs-on: windows-latest
    steps:
      - name: Download .exe artifacts
        uses: actions/download-artifact@v4
        with:
          name: hello_script-windows
      - name: Run .exe (x64 + x86 via WOW64)
        shell: bash
        run: |
          ./hello_script.exe
          ./hello_script.exe | grep -q "Hello World"
          ./hello_script-x86.exe
          ./hello_script-x86.exe | grep -q "Hello World"

  # Issue #25: til itself running on a windows HOST. bin/til.exe is the
  # compiler cross-built for windows (build_win_host) on linux, then run
  # on a real windows runner: `til.exe interpret` and `til.exe translate`
  # prove the interpreter and codegen run natively on windows -- neither
  # needs a C toolchain, and the win64 libffi is statically linked so
  # ext_func dispatch works. sender.exe is the nng mode-server example,
  # cross-built against the win64 nng (UCRT via -lucrtbase); running it
  # here proves nng works on real winsock -- wine's winsock is incomplete
  # and cannot, so this job IS the nng-on-windows proof.
  windows-x64-host-build:
    name: windows-x64 host (cross-build til.exe + nng on linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri mingw-w64 cmake
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-build til.exe (windows host compiler) and nng server
        run: |
          make build_win_host win_server
          file bin/til.exe | grep -q "PE32+"
          file bin/sender.exe | grep -q "PE32+"
          file bin/receiver.exe | grep -q "PE32+"
      - name: Upload windows-host artifacts
        uses: actions/upload-artifact@v4
        with:
          name: til-windows-host
          path: |
            bin/til.exe
            bin/sender.exe
            bin/receiver.exe

  windows-x64-host-run:
    name: windows-x64 host (run til.exe + nng on windows)
    needs: windows-x64-host-build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Download windows-host artifacts
        uses: actions/download-artifact@v4
        with:
          name: til-windows-host
          path: winhost
      - name: Interpret and translate on windows
        shell: bash
        run: |
          ./winhost/til.exe interpret examples/hello_script.til
          ./winhost/til.exe interpret examples/hello_script.til | grep -q "Hello World"
          ./winhost/til.exe translate -c tmp_hello.c examples/hello_script.til
          test -s tmp_hello.c
      - name: Run nng sender+receiver over real winsock on windows
        shell: bash
        run: |
          # Prove nng works on a REAL windows host, which wine cannot (its
          # winsock is incomplete -- listen returns "Not supported"). sender
          # listens on tcp://127.0.0.1:5555 and sends one message, then
          # closes; receiver dials, receives (3s recv-timeout so it can
          # never hang), and prints it. sender's nng_send blocks until a
          # peer takes the message, so run sender in the background and let
          # receiver drive the exchange -- running sender alone would hang.
          ./winhost/sender.exe > sender.out 2>&1 &
          spid=$!
          sleep 3
          ./winhost/receiver.exe | tee receiver.out
          # receiver has finished (or hit its 3s recv-timeout). If the
          # exchange failed, sender is still blocked in nng_send, so reap
          # it rather than wait on it -- the step must never hang.
          kill "$spid" 2>/dev/null || true
          wait "$spid" 2>/dev/null || true
          echo "--- sender output ---"; cat sender.out
          grep -q "nng version" receiver.out
          grep -q "received: hello from til over nng" receiver.out
      # Full compiler on windows: til.exe BUILDS (compiles + links) a
      # program natively, the last host capability beyond interpret/
      # translate. It needs a C toolchain -- `til.exe build` invokes
      # `gcc` (toolchain_command picks plain gcc on a windows host), so
      # ensure mingw's gcc is present. get_bin_dir walks up from
      # winhost/ to the checkout root, so src/c/ext.c and boot/ resolve
      # there; hello_script uses no runtime ext_func, so no libffi.
      - name: Build a program with til.exe on windows
        shell: bash
        run: |
          if ! command -v gcc >/dev/null 2>&1; then
            choco install mingw -y --no-progress >/dev/null
          fi
          if ! command -v gcc >/dev/null 2>&1; then
            gcc_exe=$(find /c/ProgramData/chocolatey/lib/mingw /c/ProgramData/mingw64 /c/mingw64 -name gcc.exe 2>/dev/null | head -1)
            export PATH="$(dirname "$gcc_exe"):$PATH"
          fi
          gcc --version
          ./winhost/til.exe build -o hello_native.exe examples/hello_script.til
          ./hello_native.exe
          ./hello_native.exe | grep -q "Hello World"

  # Issue #25 phase 1: native macOS. No continue-on-error anywhere: a
  # failed job fails the run, honestly red until the remaining darwin
  # bug is fixed. Runners are headless (no windowing session for
  # raylib), so run the no-gui suite -- same reason linux jobs need
  # xvfb. macos-latest is arm64; macos-15-intel is x64.
  #
  # The suite runs under ASAN (same as linux `make test`, minus gui):
  # the darwin frontier was heap corruption inside til itself that only
  # fired on mac-only code paths (the per-arch libffi binding bugs,
  # fixed); ASAN keeps mac honest the same way it keeps linux honest.
  #
  # Bounded -j: tests.til defaults its parallelism to the core count
  # (3-4 here), but the suite's memory does not fit that on these
  # runners -- measured on linux-x64: a small test's ASAN compile peaks
  # ~1GB and self_translate (til_asan translate src/til.til) peaks
  # 8.5GB. At default -j the OS silently SIGKILLs a random concurrent
  # process under memory pressure (empty captured stderr, no crash
  # report -- a SIGKILL leaves neither), the "churning victim" signature
  # of every mac failure since the suite went ASAN. -j2 got the roomier
  # macos-15-intel runner green (run 29149518241); the tighter arm64 M1
  # runner still lost 3 processes at -j2, so it drops to -j1. If -j1
  # still OOMs there, the single self_translate process is the ceiling
  # and the next lever is a smaller ASAN quarantine or running that one
  # test without ASAN.
  macos-arm64:
    name: macos-arm64 (native)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build and run tests (no gui, ASAN)
        run: |
          make bin/til bin/til_asan bin/test_runner bin/plot bin/tests
          bin/tests --no-gui --til-bin bin/til_asan --asan -j1
      - name: Test target build
        run: |
          ./bin/til build --target=macos-arm64 -o bin/hello_script_macos_arm64 examples/hello_script.til
          file bin/hello_script_macos_arm64 | grep -q "Mach-O"
          ./bin/hello_script_macos_arm64
          ./bin/hello_script_macos_arm64 | grep -q "Hello World"
      # Native mac GUI: build every mode-gui example (chess, go, shootil,
      # ...) against the real Apple SDK frameworks, which the SDK-less
      # cross toolchain lacks. This is the only way mac GUI can be built
      # (frameworks are not redistributable for a linux cross), so proving
      # it here IS the mac-gui deliverable (issue #25). raylib/tinyfd were
      # already built natively by the suite step above.
      - name: Build native mac examples (gui + portable)
        run: make build_mac
      # Guard Malloc puts every allocation on its own guarded page, so
      # an out-of-bounds or use-after-free write faults AT THE CULPRIT
      # INSTRUCTION (even from uninstrumented code like libffi asm) and
      # its crash report names the writer -- the backup net for whatever
      # ASAN cannot see. test/loops.til is a compile that has crashed
      # on these runners before; til_boot is the fallback when the
      # crash happened before bin/til was built.
      - name: Guard Malloc probe
        if: failure()
        timeout-minutes: 45
        run: |
          if [ -x bin/til ]; then
            DYLD_INSERT_LIBRARIES=/usr/lib/libgmalloc.dylib bin/til translate -c tmp/gm_probe.c test/loops.til || true
          elif [ -x bin/til_boot ]; then
            DYLD_INSERT_LIBRARIES=/usr/lib/libgmalloc.dylib bin/til_boot translate -c tmp/gm_probe.c test/loops.til || true
          fi
      # macOS crash reasons land in .ips crash reports, not stderr.
      # ReportCrash writes them asynchronously -- sometimes well past
      # 10s, occasionally to the system directory -- hence the long
      # sleep and both dirs (a 10s single-dir version missed every
      # report in runs 29027527473/x64 and 29045082029/arm64). Print a
      # COMPACT digest (procName + exception + faulting-thread frames)
      # instead of raw cats: full macOS-26 .ips files are >5000 lines
      # each and bury everything else past the log API's tail window
      # (run 29050250037). The full reports still go into the artifact
      # together with the binaries they reference (issue #25).
      - name: Dump crash reports
        if: failure()
        run: |
          sleep 30
          ls -l ~/Library/Logs/DiagnosticReports/ /Library/Logs/DiagnosticReports/ 2>/dev/null || true
          mkdir -p tmp/crash
          cp ~/Library/Logs/DiagnosticReports/*.ips tmp/crash/ 2>/dev/null || true
          sudo cp /Library/Logs/DiagnosticReports/*.ips tmp/crash/ 2>/dev/null || true
          cp bin/til bin/til_boot tmp/crash/ 2>/dev/null || true
          python3 - <<'EOF'
          import glob, json
          for p in sorted(glob.glob('tmp/crash/*.ips')):
              print('=== digest:', p)
              try:
                  raw = open(p).read()
                  body = json.loads(raw[raw.index('\n'):])
                  for k in ('procName', 'parentProc', 'exception', 'termination', 'asi'):
                      if k in body: print(k, ':', json.dumps(body[k]))
                  t = body['threads'][body.get('faultingThread', 0)]
                  for f in t.get('frames', []):
                      src = f.get('sourceFile', '')
                      line = f.get('sourceLine', '')
                      loc = ' {}:{}'.format(src, line) if src else ''
                      print('  frame img={} off={} {}{}'.format(
                          f.get('imageIndex'), f.get('imageOffset'),
                          f.get('symbol', '?'), loc))
              except Exception as e:
                  print('  digest failed:', e)
          EOF
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-macos-arm64
          path: tmp/crash/
          if-no-files-found: ignore

  macos-x64:
    name: macos-x64 (native)
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build and run tests (no gui, ASAN)
        run: |
          make bin/til bin/til_asan bin/test_runner bin/plot bin/tests
          bin/tests --no-gui --til-bin bin/til_asan --asan -j2
      - name: Test target build
        run: |
          ./bin/til build --target=macos-x64 -o bin/hello_script_macos_x64 examples/hello_script.til
          file bin/hello_script_macos_x64 | grep -q "Mach-O"
          ./bin/hello_script_macos_x64
          ./bin/hello_script_macos_x64 | grep -q "Hello World"
      # Native mac GUI build -- see the macos-arm64 job for the rationale.
      - name: Build native mac examples (gui + portable)
        run: make build_mac
      # See the macos-arm64 job for what the probe and the dump step
      # are for and why they look like this.
      - name: Guard Malloc probe
        if: failure()
        timeout-minutes: 45
        run: |
          if [ -x bin/til ]; then
            DYLD_INSERT_LIBRARIES=/usr/lib/libgmalloc.dylib bin/til translate -c tmp/gm_probe.c test/loops.til || true
          elif [ -x bin/til_boot ]; then
            DYLD_INSERT_LIBRARIES=/usr/lib/libgmalloc.dylib bin/til_boot translate -c tmp/gm_probe.c test/loops.til || true
          fi
      - name: Dump crash reports
        if: failure()
        run: |
          sleep 30
          ls -l ~/Library/Logs/DiagnosticReports/ /Library/Logs/DiagnosticReports/ 2>/dev/null || true
          mkdir -p tmp/crash
          cp ~/Library/Logs/DiagnosticReports/*.ips tmp/crash/ 2>/dev/null || true
          sudo cp /Library/Logs/DiagnosticReports/*.ips tmp/crash/ 2>/dev/null || true
          cp bin/til bin/til_boot tmp/crash/ 2>/dev/null || true
          python3 - <<'EOF'
          import glob, json
          for p in sorted(glob.glob('tmp/crash/*.ips')):
              print('=== digest:', p)
              try:
                  raw = open(p).read()
                  body = json.loads(raw[raw.index('\n'):])
                  for k in ('procName', 'parentProc', 'exception', 'termination', 'asi'):
                      if k in body: print(k, ':', json.dumps(body[k]))
                  t = body['threads'][body.get('faultingThread', 0)]
                  for f in t.get('frames', []):
                      src = f.get('sourceFile', '')
                      line = f.get('sourceLine', '')
                      loc = ' {}:{}'.format(src, line) if src else ''
                      print('  frame img={} off={} {}{}'.format(
                          f.get('imageIndex'), f.get('imageOffset'),
                          f.get('symbol', '?'), loc))
              except Exception as e:
                  print('  digest failed:', e)
          EOF
      - name: Upload crash artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crash-macos-x64
          path: tmp/crash/
          if-no-files-found: ignore

  # Issue #25 phase 2: SDK-less cross-compilation from the canonical
  # linux-x64 host to both mac targets (vendored zig-derived headers +
  # libSystem.tbd + distro clang/lld), with the artifacts executed on
  # the real mac runners -- the same build/run pair shape as
  # windows-x64. Keeping linux-x64 as the single cross host avoids a
  # combinatorial host-x-target explosion in CI.
  macos-cross-build:
    name: macos (cross-compile on linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri clang lld
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile for macos-arm64 and macos-x64
        run: |
          ./bin/til build --target=macos-arm64 -o bin/hello_script-macos-arm64 examples/hello_script.til
          file bin/hello_script-macos-arm64 | grep -q "Mach-O 64-bit arm64"
          ./bin/til build --target=macos-x64 -o bin/hello_script-macos-x64 examples/hello_script.til
          file bin/hello_script-macos-x64 | grep -q "Mach-O 64-bit x86_64"
      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_script-macos
          path: |
            bin/hello_script-macos-arm64
            bin/hello_script-macos-x64

  macos-arm64-cross-run:
    name: macos-arm64 (run cross binary on mac)
    needs: macos-cross-build
    runs-on: macos-latest
    steps:
      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: hello_script-macos
      - name: Run cross-built binary
        run: |
          chmod +x hello_script-macos-arm64
          ./hello_script-macos-arm64
          ./hello_script-macos-arm64 | grep -q "Hello World"

  macos-x64-cross-run:
    name: macos-x64 (run cross binary on mac)
    needs: macos-cross-build
    runs-on: macos-15-intel
    steps:
      - name: Download mac artifacts
        uses: actions/download-artifact@v4
        with:
          name: hello_script-macos
      - name: Run cross-built binary
        run: |
          chmod +x hello_script-macos-x64
          ./hello_script-macos-x64
          ./hello_script-macos-x64 | grep -q "Hello World"

  # Issue #25: macOS as a HOST cross-compiling to the OTHER OSes (the
  # last two matrix cells). The mac runner builds bin/til natively, then
  # cross-builds hello_script for windows and linux. Windows uses the
  # brew mingw-w64 cross-gcc, which toolchain_command already selects
  # for a windows target from any non-windows host. Linux uses a
  # prebuilt cross-gcc (messense tap) via --cc, the same override the
  # riscv32 job uses. Compiled programs bind ext_func to direct C
  # symbols and never reference libffi, so no cross libffi is needed.
  # The artifacts run on real windows / linux runners -- the build/run
  # pair shape used by the windows and macos-cross jobs.
  macos-host-cross-build:
    name: macos host (cross-build for windows + linux)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Install cross toolchains
        run: |
          brew install mingw-w64
          brew tap messense/macos-cross-toolchains
          # Homebrew's tap-trust check blocks third-party formulae until
          # the tap is explicitly trusted; the linux cross-gcc lives in
          # this tap (homebrew-core ships no linux cross-gcc).
          brew trust messense/macos-cross-toolchains
          brew install x86_64-unknown-linux-gnu
      - name: Build bin/til (native)
        run: make
      - name: Cross-compile hello_script for windows-x64
        run: |
          ./bin/til build --target=windows-x64 -o bin/hello_script-from-mac.exe examples/hello_script.til
          file bin/hello_script-from-mac.exe | grep -q "PE32+"
      - name: Cross-compile hello_script for linux-x64
        run: |
          ./bin/til build --target=linux-x64 --cc=x86_64-unknown-linux-gnu-gcc \
            -o bin/hello_script-from-mac-linux examples/hello_script.til
          file bin/hello_script-from-mac-linux | grep -q "ELF 64-bit"
      - name: Upload cross artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_script-from-mac
          path: |
            bin/hello_script-from-mac.exe
            bin/hello_script-from-mac-linux

  macos-host-cross-win-run:
    name: macos host cross (run .exe on windows)
    needs: macos-host-cross-build
    runs-on: windows-latest
    steps:
      - name: Download cross artifacts
        uses: actions/download-artifact@v4
        with:
          name: hello_script-from-mac
      - name: Run mac-built .exe
        shell: bash
        run: |
          ./hello_script-from-mac.exe
          ./hello_script-from-mac.exe | grep -q "Hello World"

  macos-host-cross-linux-run:
    name: macos host cross (run ELF on linux)
    needs: macos-host-cross-build
    runs-on: ubuntu-latest
    steps:
      - name: Download cross artifacts
        uses: actions/download-artifact@v4
        with:
          name: hello_script-from-mac
      - name: Run mac-built ELF
        run: |
          chmod +x hello_script-from-mac-linux
          ./hello_script-from-mac-linux
          ./hello_script-from-mac-linux | grep -q "Hello World"

  # Issue #25 phase 3 / #232: mac GUI cross from Linux end to end, with NO
  # mac and NO Apple SDK. raylib's RGFW desktop backend drives Cocoa through
  # the objc runtime (objc_msgSend), so it cross-compiles against the
  # SDK-less framework-type shims (vendor/macos/frameworks-shim); the
  # RAYLIB_MAC_*_LIB Makefile targets build the per-arch archives on linux
  # and gen_framework_stubs.py --linux-map emits the .tbd link stubs from
  # their external symbols (the real Cocoa/OpenGL/... dylibs bind at runtime
  # on the target mac, exactly like the vendored libSystem.tbd). This job
  # builds the whole chain on linux and asserts a valid Mach-O per arch --
  # the mac analogue of the mingw-cross windows gui, no prebuilt binaries.
  macos-gui-cross:
    name: macos gui (cross-compile on linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libgl-dev xvfb libgl1-mesa-dri clang lld llvm
      - name: Create test tmp directory
        run: mkdir -p tmp
      - name: Build bin/til (native)
        run: make
      - name: Build mac raylib + tinyfd + framework stubs on linux (no SDK)
        run: make vendor/macos/frameworks/.stamp vendor/tinyfiledialogs/libtinyfd-macos-arm64.a vendor/tinyfiledialogs/libtinyfd-macos-x64.a
      - name: Cross-compile a mode-gui example for both mac arches
        run: |
          ./bin/til build --target=macos-arm64 -o bin/hello_gui-macos-arm64 examples/hello_gui.til
          file bin/hello_gui-macos-arm64 | grep -q "Mach-O 64-bit arm64"
          ./bin/til build --target=macos-x64 -o bin/hello_gui-macos-x64 examples/hello_gui.til
          file bin/hello_gui-macos-x64 | grep -q "Mach-O 64-bit x86_64"
      - name: Upload mac gui artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hello_gui-macos
          path: |
            bin/hello_gui-macos-arm64
            bin/hello_gui-macos-x64
